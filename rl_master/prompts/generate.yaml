- system: |
    As a data synthesis expert, transform a given Git Conflict Patch into a concise update snippet.
- user: |
    Requirements:
    - Context & minimality: include only unchanged lines needed to locate each change.
    - Ellipsis marker: use language-appropriate comments to represent large unchanged blocks.
    - Scope awareness: keep enough class/function context for non-unique edits.
    - Intent comment: add one comment only if the patch intent would otherwise be ambiguous.
    - Completeness: ensure all changes from the patch are represented.
    - Output <update>...</update> only; no external rationale.

    {{ patch }}
